[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [
    ".venv",
    "app/chroma/db",
    "app/__pycache__",
    "common/__pycache__",
    "evaluation/results",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (unused imports, undefined names)
    "W",   # pycodestyle warnings
    "I",   # isort (import sorting)
    "UP",  # pyupgrade (modern syntax)
    "B",   # bugbear (likely bugs)
]
ignore = [
    "E501",  # line too long (formatter handles it)
    "B008",  # function calls in default arg (常见于 langchain)
]

[tool.ruff.lint.per-file-ignores]
"evaluation/*" = ["E402"]  # 评测脚本里允许 import 在顶部之外

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
