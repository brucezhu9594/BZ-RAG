name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MODEL_ID: dummy-model
      USER_AGENT: ci-bot
      OPENAI_API_KEY: dummy
      ZHIPUAI_API_KEY: dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile all Python files
        run: python -m compileall -q .

      - name: Smoke import
        run: |
          python -c "from common.keyword_expansion import expand_keywords; print(expand_keywords('PM'))"
