name: Security Scan

on:
  push:
    branches: [master]
    paths:
      - "requirements.txt"
      - ".github/workflows/security.yml"
  pull_request:
    branches: [master]
    paths:
      - "requirements.txt"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "0 6 * * 1" # 每周一 6 点 UTC 扫描

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --strict
