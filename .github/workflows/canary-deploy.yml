name: Canary Deploy

on:
  push:
    branches: [master]

# 同一时间只允许一个 release 流水线在跑（避免 semantic-release 抢着写 CHANGELOG）
concurrency:
  group: canary-deploy-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # --- Job 1: semantic-release 计算版本号、生成 CHANGELOG、打 tag、建 GH release ---
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Generate App Token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}
          persist-credentials: false

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}

  # --- Job 2: 把新版本部署到 canary service，再放 5% 流量过去 ---
  deploy-canary:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new_release_version }}
          fetch-depth: 0

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set APP_VERSION on canary service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variable set APP_VERSION="v${{ needs.release.outputs.new_release_version }}" \
            -s "${{ secrets.RAILWAY_SERVICE_ID_CANARY }}" \
            -e "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" \
            --skip-deploys

      - name: Deploy canary
        timeout-minutes: 15
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ steps.vars.outputs.sha_short }}
        run: |
          VERSION="v${{ needs.release.outputs.new_release_version }}"
          DEPLOY_MESSAGE="Deploy canary ${VERSION} (${SHA}) by ${ACTOR}"

          echo "Deploying ${VERSION} to canary..."

          railway up \
            -p "${{ secrets.RAILWAY_PROJECT_ID }}" \
            -s "${{ secrets.RAILWAY_SERVICE_ID_CANARY }}" \
            -e "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" \
            -m "${DEPLOY_MESSAGE}" \
            --ci \
            --json > deploy.log 2>&1 &
          RAILWAY_PID=$!

          FAIL_PATTERN="canceled|failed to solve|context canceled|Deploy failed|no changes detected"
          SUCCESS_PATTERN='"status":\s*"(SUCCESS|success)"'
          while kill -0 "$RAILWAY_PID" 2>/dev/null; do
            if grep -qiE "$FAIL_PATTERN" deploy.log 2>/dev/null; then
              echo "ERROR: Railway build failed or was skipped!"
              cat deploy.log
              kill "$RAILWAY_PID" 2>/dev/null || true
              exit 1
            fi
            if grep -qE "$SUCCESS_PATTERN" deploy.log 2>/dev/null; then
              echo "Railway deploy succeeded."
              kill "$RAILWAY_PID" 2>/dev/null || true
              break
            fi
            sleep 2
          done

          wait "$RAILWAY_PID" 2>/dev/null || true
          cat deploy.log

          if grep -qiE "$FAIL_PATTERN" deploy.log; then
            echo "ERROR: Railway build failed or was skipped!"
            exit 1
          fi

          echo "Canary deployment submitted successfully."

      - name: Wait for canary health
        timeout-minutes: 5
        run: |
          chmod +x ./scripts/wait-for-health.sh
          ./scripts/wait-for-health.sh \
            "https://bz-rag-canary-production.up.railway.app/api/health" \
            "${{ needs.release.outputs.new_release_version }}" \
            240

      - name: Route 5% of traffic to canary
        run: |
          chmod +x ./scripts/cf-kv-update.sh
          ./scripts/cf-kv-update.sh 5
